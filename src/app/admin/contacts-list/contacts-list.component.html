<div class="admin-content">
    <h2>Contact Messages</h2>
    <table class="table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Subject</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let contact of contacts">
                <td>{{ contact.name }}</td>
                <td>{{ contact.email }}</td>
                <td>{{ contact.subject || 'N/A' }}</td>
                <td>{{ contact.createdAt | date:'short' }}</td>
                <td><button class="button small" (click)="viewMessage(contact)">View</button></td>
            </tr>
        </tbody>
    </table>
</div>
